name: dalali
description: "Dalali - Connect landlords and house seekers in Tanzania."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  image_picker: ^1.0.7
  geolocator: ^10.4.0
  http: ^1.2.0
  crypto: ^3.0.3

  # Supabase
  supabase_flutter: ^2.8.4

  # For maps - using flutter_map to avoid Google Maps API key setup
  flutter_map: ^7.0.0
  flutter_map_cancellable_tile_provider: ^3.0.2
  latlong2: ^0.9.1
  fl_chart: ^0.68.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
