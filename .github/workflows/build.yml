name: Build DALALI APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add swap space
        run: |
          if sudo test -f /swapfile; then
            sudo swapoff /swapfile 2>/dev/null || true
            sudo rm -f /swapfile
          fi

          sudo dd if=/dev/zero of=/swapfile bs=1G count=8
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create dummy firebase_options.dart
        run: |
          mkdir -p lib
          if [ ! -f "lib/firebase_options.dart" ]; then
            python3 - <<'PY'
            from pathlib import Path
            path = Path("lib/firebase_options.dart")
            path.write_text("""import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
            import 'package:flutter/foundation.dart'
                show defaultTargetPlatform, kIsWeb, TargetPlatform;

            class DefaultFirebaseOptions {
              static FirebaseOptions get currentPlatform {
                if (kIsWeb) {
                  return web;
                }
                switch (defaultTargetPlatform) {
                  case TargetPlatform.android:
                    return android;
                  case TargetPlatform.iOS:
                    return ios;
                  default:
                    throw UnsupportedError('Unsupported platform');
                }
              }

              static const FirebaseOptions web = FirebaseOptions(
                apiKey: 'DUMMY',
                appId: 'DUMMY',
                messagingSenderId: 'DUMMY',
                projectId: 'DUMMY',
                authDomain: 'DUMMY',
                storageBucket: 'DUMMY',
                measurementId: 'DUMMY',
              );

              static const FirebaseOptions android = FirebaseOptions(
                apiKey: 'DUMMY',
                appId: 'DUMMY',
                messagingSenderId: 'DUMMY',
                projectId: 'DUMMY',
                storageBucket: 'DUMMY',
              );

              static const FirebaseOptions ios = FirebaseOptions(
                apiKey: 'DUMMY',
                appId: 'DUMMY',
                messagingSenderId: 'DUMMY',
                projectId: 'DUMMY',
                storageBucket: 'DUMMY',
                iosBundleId: 'DUMMY',
              );
            }
            """)
            PY
          fi

      - name: Build APK
        env:
          GRADLE_OPTS: -Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=2
        run: |
          export _JAVA_OPTIONS="-Xmx2048m"
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dalali-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
