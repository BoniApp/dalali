name: Deploy Edge Functions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deno-tests-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.3"

      - name: Run Deno tests for Edge Functions
        run: |
          cd supabase/functions
          deno test --unstable --quiet --allow-env

      - name: Deploy Edge Functions (optional)
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN && secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          echo "Deploying Edge Functions"
          npm i -g supabase
          supabase functions deploy --project-ref $SUPABASE_PROJECT_REF --no-verify
